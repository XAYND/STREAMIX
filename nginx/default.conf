server {
    listen 80;
    return 301 https://localhost:8443$request_uri;
}

server {
    listen 443 ssl;

    ssl_certificate /etc/nginx/certs/localhost.pem;
    ssl_certificate_key /etc/nginx/certs/localhost-key.pem;

    include /etc/nginx/mime.types;
    default_type text/plain;

    location /hls/ {
        root /usr/share/nginx/html;
        try_files $uri =404;

        add_header Access-Control-Allow-Origin "https://localhost:8443" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Streamix-Session, X-Admin-Token" always;
    }
}