# Mirrors the key-server's ALLOWED_ORIGINS so the front (Vite dev server on
# :5173) can fetch video.m3u8 / segments without being blocked by CORS.
map $http_origin $streamix_cors_origin {
    default "";
    "~^https://localhost:8443$" $http_origin;
    "~^http://localhost:5173$" $http_origin;
    "~^http://localhost:8080$" $http_origin;
    "~^http://localhost:3000$" $http_origin;
}

server {
    listen 80;
    return 301 https://localhost:8443$request_uri;
}

server {
    listen 443 ssl;

    ssl_certificate /etc/nginx/certs/localhost.pem;
    ssl_certificate_key /etc/nginx/certs/localhost-key.pem;

    include /etc/nginx/mime.types;
    default_type text/plain;

    location /hls/ {
        root /usr/share/nginx/html;
        try_files $uri =404;

        add_header Access-Control-Allow-Origin $streamix_cors_origin always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Streamix-Session, X-Admin-Token" always;
    }
}